<form class="contact-form" id="contactForm">

  <input
    type="text"
    name="name"
    placeholder="Your Full Name *"
    required>

  <input
    type="email"
    name="email"
    placeholder="Business Email *"
    required>

  <input
    type="text"
    name="company"
    placeholder="Company / Business Name">

  <input
    type="text"
    name="country"
    placeholder="Country *"
    required>

  <select name="product">
    <option value="" disabled selected>
      Product Interest
    </option>

    <option>Turmeric & Neem Bar</option>
    <option>Sandalwood & Saffron Bar</option>
    <option>Rose & Coconut Milk Bar</option>
    <option>Activated Charcoal Bar</option>
    <option>Custom / OEM Order</option>
    <option>Full Catalog</option>
  </select>

  <input
    type="number"
    name="quantity"
    placeholder="Estimated Monthly Quantity (units)">

  <textarea
    name="message"
    placeholder="Your message or specific requirements...">
  </textarea>

  <button
    type="submit"
    class="contact-submit"
    id="submitBtn">

    Send Inquiry ✦

  </button>

  <div
    id="successMsg"
    style="
      display:none;
      color:#5A7;
      font-size:0.85rem;
      text-align:center;
      padding:0.5rem;
      background:rgba(90,170,90,0.15);
      border-radius:8px;
      margin-top:10px;
    ">
  </div>

</form>

<script src="config.js"></script>

<script>

document
.getElementById("contactForm")
.addEventListener(
"submit",
async function(e){

  e.preventDefault();

  const btn =
  document.getElementById("submitBtn");

  btn.disabled = true;
  btn.innerHTML = "Sending...";

  const formData = {

    name:
    document.querySelector('[name="name"]').value,

    email:
    document.querySelector('[name="email"]').value,

    company:
    document.querySelector('[name="company"]').value,

    country:
    document.querySelector('[name="country"]').value,

    product:
    document.querySelector('[name="product"]').value,

    quantity:
    document.querySelector('[name="quantity"]').value,

    message:
    document.querySelector('[name="message"]').value

  };

  try {

    const response =
    await fetch(
      CONFIG.SCRIPT_URL,
      {
        method: "POST",
        body: JSON.stringify(formData)
      }
    );

    const result =
    await response.json();

    if(result.result === "success"){

      document
      .getElementById("successMsg")
      .innerHTML =
      CONFIG.SUCCESS_MESSAGE;

      document
      .getElementById("successMsg")
      .style.display =
      "block";

      document
      .getElementById("contactForm")
      .reset();

      btn.innerHTML =
      "Inquiry Sent ✓";

    } else {

      alert(
        result.message ||
        "Submission failed"
      );

      btn.disabled = false;
      btn.innerHTML =
      "Send Inquiry ✦";
    }

  }
  catch(error){

    alert(
      "Unable to submit inquiry."
    );

    btn.disabled = false;
    btn.innerHTML =
    "Send Inquiry ✦";
  }

});

</script>
